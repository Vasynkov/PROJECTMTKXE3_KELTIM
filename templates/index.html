<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="overlay-dark"></div>
    
    <!-- SMAN 4 Jakarta Logo (Floating Top Right) -->
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000; text-align: center; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 15px; border: 3px solid var(--qz-light-purple); box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
        <img src="{{ school_logo }}" alt="Logo SMAN 4 Jakarta" style="width: 80px; height: auto;">
        <p style="margin: 5px 0 0 0; font-size: 0.6em; color: var(--qz-purple); font-weight: bold;">SMAN 4 JAKARTA</p>
    </div>

    <div class="container">
        <div class="qz-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.5em;">🏫</span>
                <h3 style="margin: 0; font-size: 0.9em;">X-E3 Kelompok TIM</h3>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span>👥 1,240 Players</span>
                <span>🏆 Top 1%</span>
            </div>
        </div>

        <div class="qz-card" style="text-align: center;">
            <h1 style="color: var(--qz-light-purple); font-size: 2.5em; text-shadow: 2px 2px 0px rgba(0,0,0,0.1);">TRIGO QUEST</h1>
            <p style="color: #666; font-weight: bold;">Quizizz Edition - X-E3 Kelompok TIM</p>
            
            <div style="margin: 40px 0;">
                <form action="{{ url_for('start_game') }}" method="POST">
                    <div style="margin-bottom: 20px;">
                        <input type="text" name="player_name" placeholder="Enter your name..." required 
                               style="width: 80%; padding: 15px; border-radius: 10px; border: 2px solid #ddd; font-size: 1.2em; text-align: center; font-family: 'Quicksand', sans-serif;">
                    </div>
                    <button type="submit" class="btn-qz btn-start">START GAME</button>
                    <div style="margin-top: 15px;">
                        <a href="{{ url_for('learn') }}" class="btn-qz btn-learn" style="width: 80%;">LEARN MATERIAL</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="qz-card">
            <h3 style="text-align: center; color: var(--qz-light-purple);">TOP LEADERBOARD</h3>
            <table class="sb-table">
                <thead>
                    <tr>
                        <th>RANK</th>
                        <th>NAME</th>
                        <th>SCORE</th>
                        <th>TIME</th>
                    </tr>
                </thead>
                <tbody id="score-body">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>

        <div style="text-align: center; margin-top: 30px; font-size: 0.9em; color: white; opacity: 0.8;">
            <p>Developed by: <strong>Gilang Satria Pratama</strong> & Kelompok TIM</p>
            <p>SMAN 4 Jakarta | 2026</p>
            <a href="{{ url_for('admin_login') }}" style="color: white; text-decoration: none; opacity: 0.3;">Admin</a>
        </div>
    </div>

    <!-- Anime Mascot -->
    <div class="anime-character">
        <div class="anime-speech">"Ayo tunjukkan kemampuan trigonometrimu!"</div>
        <img src="https://www.pngarts.com/files/12/Anime-Girl-Holding-Book-PNG-Photo.png" alt="Mascot" style="width: 100%;">
    </div>

    <script>
        fetch('/scoreboard_data')
            .then(response => response.json())
            .then(data => {
                const body = document.getElementById('score-body');
                if (data.length === 0) {
                    body.innerHTML = '<tr><td colspan="4">No scores yet. Be the first!</td></tr>';
                    return;
                }
                data.forEach((score, index) => {
                    const row = `<tr>
                        <td>${index + 1}</td>
                        <td>${score.name}</td>
                        <td>${score.score}</td>
                        <td>${score.time_taken}s</td>
                    </tr>`;
                    body.innerHTML += row;
                });
            });
    </script>
</body>
</html>
