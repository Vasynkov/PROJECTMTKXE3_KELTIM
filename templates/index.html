<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - {{ project_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="overlay-dark"></div>
    
    <!-- Ultra Stable School Branding -->
    <div class="school-logo-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); padding: 12px; border: 2px solid var(--cyber-cyan); box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); border-radius: 20px;">
        <img src="{{ school_logo }}" alt="SMAN 4 Jakarta" style="width: 70px; height: auto; margin-bottom: 5px;">
        <p style="color: var(--cyber-cyan); font-family: 'Orbitron'; font-weight: bold; font-size: 0.7em; margin: 0;">SMAN 4 JAKARTA</p>
    </div>

    <div class="container">
        <div class="qz-header cyber-border" style="margin-top: 20px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.5em;">🌌</span>
                <h3 style="margin: 0; font-size: 0.9em; font-family: 'Orbitron';">KELOMPOK TIM X-E3</h3>
            </div>
            <div style="display: flex; align-items: center; gap: 20px; font-size: 0.8em; color: var(--cyber-green);">
                <span>STATUS: OPERATIONAL</span>
                <span style="color: var(--cyber-yellow);">V_2.5.0</span>
            </div>
        </div>

        <div class="qz-card cyber-border" style="text-align: center; margin-top: 40px;">
            <h1 class="glitch-text" style="font-size: 3.5em; margin: 0.1em 0;">TRIGO QUEST</h1>
            <p style="color: var(--cyber-cyan); font-weight: bold; letter-spacing: 4px; font-family: 'Orbitron'; font-size: 0.9em;">SYSTEM_ACCESS_GRANTED</p>
            
            <div style="margin: 50px 0;">
                <div style="margin-bottom: 30px;">
                    <a href="https://quizizz.com/join?query=Trigonometri+Kuadran+Kelas+10" target="_blank" class="btn-qz btn-start" style="display: block; width: 85%; padding: 20px; font-size: 1.4em; text-decoration: none; margin: 0 auto;">INITIALIZE MISSION (WAYGROUND)</a>
                </div>
                <div style="margin-top: 25px;">
                    <a href="{{ url_for('learn') }}" class="btn-qz btn-learn" style="display: block; width: 85%; padding: 15px; text-decoration: none; margin: 0 auto;">ACCESS ARCHIVES (STUDY)</a>
                </div>
            </div>
        </div>

        <!-- Group Recognition -->
        <div class="qz-card" style="background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);">
            <h4 style="color: var(--cyber-pink); text-align: center; margin-bottom: 20px; font-family: 'Orbitron';">DEVELOPMENT UNIT: TAMAN ISMAIL MARZUKI</h4>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; font-size: 0.85em;">
                {% for m in members %}
                <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border-left: 3px solid var(--cyber-pink);">
                    <span style="color: #999;">#{{ m.no }}</span> <strong style="color: #fff;">{{ m.name }}</strong>
                </div>
                {% endfor %}
            </div>
        </div>

        <div style="text-align: center; margin-top: 50px; font-size: 0.8em; color: rgba(255,255,255,0.3); font-family: 'Orbitron';">
            <p>© 2026 CRY_LABS. ALL RIGHTS RESERVED.</p>
        </div>
    </div>

    <!-- Mascot -->
    <div class="anime-mascot" style="position: fixed; bottom: -10px; left: 20px; width: 220px; pointer-events: none;">
        <img src="https://www.pngarts.com/files/12/Anime-Girl-Holding-Book-PNG-Photo.png" alt="Mascot" style="width: 100%; filter: drop-shadow(0 0 10px var(--cyber-pink));">
    </div>
</body>
</html>
