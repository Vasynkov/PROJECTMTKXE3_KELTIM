<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Playing - {{ project_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <img src="{{ school_logo }}" alt="Logo SMAN 4 Jakarta" class="school-logo">
    <div class="container">
        <div id="game-container" class="cyber-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon-blue); padding-bottom: 10px; margin-bottom: 20px;">
                <h3 id="progress">Soal #{{ q_num }} / 20</h3>
                <h3 id="timer">Waktu: 0s</h3>
            </div>

            <div class="difficulty-tag" style="color: var(--neon-green); font-size: 0.8em; margin-bottom: 10px;">
                LEVEL: {{ question.difficulty }}
            </div>

            <h2 id="question-text">{{ question.question }}</h2>

            <div class="options-grid">
                <button class="btn option-btn" onclick="checkAnswer('{{ question.option_a }}')">{{ question.option_a }}</button>
                <button class="btn option-btn" onclick="checkAnswer('{{ question.option_b }}')">{{ question.option_b }}</button>
                <button class="btn option-btn" onclick="checkAnswer('{{ question.option_c }}')">{{ question.option_c }}</button>
                <button class="btn option-btn" onclick="checkAnswer('{{ question.option_d }}')">{{ question.option_d }}</button>
            </div>

            <div id="clue-section" style="margin-top: 30px;">
                <button class="btn btn-secondary" style="padding: 5px 15px; font-size: 0.8em;" onclick="showClue()">MINTA CLUE (Hint)</button>
                <div id="clue-box" class="clue-box" style="display: none;">
                    {{ question.clue }}
                </div>
            </div>

            <!-- Power ups simulation UI -->
            <div style="margin-top: 30px; display: flex; gap: 10px; opacity: 0.6;">
                <div style="padding: 5px; border: 1px solid var(--neon-blue); font-size: 0.7em;">50:50 [READY]</div>
                <div style="padding: 5px; border: 1px solid var(--neon-blue); font-size: 0.7em;">2x SCORE [READY]</div>
            </div>
        </div>

        <!-- Feedback Modal -->
        <div id="feedback-modal" class="cyber-panel" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 80%; max-width: 500px; text-align: center;">
            <h2 id="feedback-title"></h2>
            <p id="feedback-text"></p>
            <div id="reaction-img" style="margin: 20px 0;"></div>
            <button class="btn btn-primary" onclick="nextQuestion()">SOAL BERIKUTNYA</button>
        </div>
        <div id="overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500;"></div>
    </div>

    <script>
        let startTime = Date.now();
        setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').innerText = `Waktu: ${elapsed}s`;
        }, 1000);

        function showClue() {
            document.getElementById('clue-box').style.display = 'block';
        }

        function checkAnswer(answer) {
            const qId = "{{ question.id }}";
            const formData = new FormData();
            formData.append('answer', answer);
            formData.append('q_id', qId);

            fetch('/submit_answer', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                const modal = document.getElementById('feedback-modal');
                const overlay = document.getElementById('overlay');
                const title = document.getElementById('feedback-title');
                const text = document.getElementById('feedback-text');
                const reaction = document.getElementById('reaction-img');

                overlay.style.display = 'block';
                modal.style.display = 'block';

                if (data.correct) {
                    title.innerText = "BENAR! (NICE!)";
                    title.style.color = "var(--neon-green)";
                    text.innerText = "Kamu memang jago trigonometri!";
                    reaction.innerHTML = '<img src="https://media.tenor.com/y2976H9T_mQAAAAC/anime-smile.gif" width="150">';
                } else {
                    title.innerText = "SALAH! (Baka!)";
                    title.style.color = "var(--neon-pink)";
                    text.innerText = `Jawaban yang benar: ${data.answer}. \n ${data.explanation}`;
                    reaction.innerHTML = '<img src="https://media.tenor.com/9n9_6E2X7nAAAAAC/anime-shock.gif" width="150">';
                }
            });
        }

        function nextQuestion() {
            window.location.reload();
        }
    </script>
</body>
</html>
