<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - {{ project_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="overlay-dark"></div>
    <div class="container" style="max-width: 450px; margin-top: 100px;">
        <div class="qz-card" style="text-align: center;">
            <h3 style="color: var(--qz-light-purple);">ADMIN LOGIN</h3>
            <p style="font-size: 0.8em; color: #999; margin-bottom: 20px;">Restricted access for authorized personnel only.</p>
            
            <form action="{{ url_for('admin_login') }}" method="POST">
                <div style="margin-bottom: 15px;">
                    <input type="text" name="username" placeholder="Username" required 
                           style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Quicksand', sans-serif;">
                </div>
                <div style="margin-bottom: 20px;">
                    <input type="password" name="password" placeholder="Password" required 
                           style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Quicksand', sans-serif;">
                </div>
                <button type="submit" class="btn-qz btn-start" style="width: 100%;">LOGIN TO DASHBOARD</button>
            </form>
            
            <div style="margin-top: 20px;">
                <a href="{{ url_for('home') }}" style="color: #666; font-size: 0.9em;">Cancel and go back</a>
            </div>
        </div>
    </div>
</body>
</html>
