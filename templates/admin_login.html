<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - {{ project_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="cyber-panel" style="text-align: center;">
            <h3>ADMIN ACCESS</h3>
            <form action="{{ url_for('admin_login') }}" method="POST">
                <input type="text" name="username" placeholder="Username" required style="width: 100%; padding: 10px; margin-bottom: 15px; background: #000; color: #fff; border: 1px solid var(--neon-blue);">
                <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 10px; margin-bottom: 15px; background: #000; color: #fff; border: 1px solid var(--neon-blue);">
                <button type="submit" class="btn btn-primary">LOGIN</button>
            </form>
        </div>
    </div>
</body>
</html>
