<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Finished - {{ project_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="overlay-dark"></div>

    <div class="container" style="text-align: center;">
        <div class="qz-card">
            <h1 style="color: var(--qz-light-purple);">GAME COMPLETED!</h1>
            <div id="finish-anime" style="margin: 20px 0;">
                <img src="https://media.tenor.com/images/5f0f3e3e3b3b3b3b3b3b3b3b3b3b3b3b/tenor.gif" width="200" alt="Anime Win" style="border-radius: 10px;">
            </div>
            
            <h2 style="font-size: 2em; margin-bottom: 0;">{{ name }}</h2>
            <p style="color: #666; margin-top: 5px;">Great job completing the Trigo Quest!</p>

            <div style="display: flex; justify-content: space-around; margin: 30px 0;">
                <div>
                    <h3 style="margin: 0; color: var(--qz-yellow);">{{ score }}</h3>
                    <p style="margin: 0; font-size: 0.8em;">TOTAL SCORE</p>
                </div>
                <div>
                    <h3 style="margin: 0; color: var(--qz-green);">{{ acc }}%</h3>
                    <p style="margin: 0; font-size: 0.8em;">ACCURACY</p>
                </div>
                <div>
                    <h3 style="margin: 0; color: var(--qz-blue);">{{ time }}s</h3>
                    <p style="margin: 0; font-size: 0.8em;">TIME TAKEN</p>
                </div>
            </div>

            <div style="margin: 20px 0; padding: 15px; background: var(--qz-gray); border-radius: 10px;">
                <span style="font-weight: bold;">Correct: {{ correct }} / {{ total }}</span>
            </div>

            <div style="display: flex; gap: 10px; flex-direction: column;">
                <a href="{{ url_for('home') }}" class="btn-qz btn-start">PLAY AGAIN</a>
                <a href="{{ url_for('learn') }}" class="btn-qz btn-learn">STUDY MORE</a>
            </div>
        </div>

        <div class="qz-card">
            <h3 style="color: var(--qz-light-purple);">YOUR STANDING</h3>
            <div id="rank-info" style="font-size: 1.2em; font-weight: bold;">
                Checking leaderboard...
            </div>
        </div>
    </div>

    <script>
        confetti({
            particleCount: 150,
            spread: 100,
            origin: { y: 0.6 }
        });

        // Small delay to let DB update
        setTimeout(() => {
            fetch('/scoreboard_data')
                .then(r => r.json())
                .then(data => {
                    const name = "{{ name }}";
                    const score = {{ score }};
                    const rankInfo = document.getElementById('rank-info');
                    
                    const myRank = data.findIndex(s => s.name === name && s.score === score) + 1;
                    if (myRank > 0) {
                        rankInfo.innerHTML = `You are currently ranked <span style="color: var(--qz-yellow);">#${myRank}</span> on the leaderboard!`;
                    } else {
                        rankInfo.innerText = "Keep playing to reach the top 10!";
                    }
                });
        }, 1000);
    </script>
</body>
</html>
